name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: latest
          install-only: true

      - name: Release
        uses: dakaneye/hookshot/release-pilot@1b43157bc205516bdb653ebeccdb7ef7079bb19d
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          args: "--tag ${{ github.ref_name }}"

  container:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install apko
        run: GOTOOLCHAIN=auto go install chainguard.dev/apko@latest

      - name: Install crane
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MAJOR=${VERSION%%.*}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Check if base image needs rebuild
        id: base-check
        run: |
          IMAGE=ghcr.io/dakaneye/claude-sandbox
          # Hash the apko config to detect changes
          APKO_HASH=$(sha256sum internal/container/configs/apko.yaml | cut -d' ' -f1)
          echo "apko_hash=${APKO_HASH:0:12}" >> "$GITHUB_OUTPUT"

          # Check if a base image with this config hash already exists
          if crane manifest "${IMAGE}:base-${APKO_HASH:0:12}" >/dev/null 2>&1; then
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
            echo "Base image cache hit (hash: ${APKO_HASH:0:12})"
          else
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Base image needs rebuild (hash: ${APKO_HASH:0:12})"
          fi

      - name: Build base images
        if: steps.base-check.outputs.rebuild == 'true'
        run: |
          mkdir -p /tmp/build
          cp internal/container/configs/apko.yaml /tmp/build/
          cp internal/container/configs/prebake.dockerfile /tmp/build/
          for ARCH in amd64 arm64; do
            apko build /tmp/build/apko.yaml claude-sandbox:base /tmp/build/base-${ARCH}.tar --arch ${ARCH}
          done

      - name: Load and push base images
        if: steps.base-check.outputs.rebuild == 'true'
        run: |
          IMAGE=ghcr.io/dakaneye/claude-sandbox
          HASH=${{ steps.base-check.outputs.apko_hash }}
          for ARCH in amd64 arm64; do
            docker load -i /tmp/build/base-${ARCH}.tar
            docker tag "claude-sandbox:base-${ARCH}" "${IMAGE}:base-${ARCH}"
            docker push "${IMAGE}:base-${ARCH}"
          done
          # Tag with config hash for future cache hits
          docker manifest create "${IMAGE}:base-${HASH}" \
            "${IMAGE}:base-amd64" "${IMAGE}:base-arm64"
          docker manifest push "${IMAGE}:base-${HASH}"
          # Update :base tag
          docker manifest create "${IMAGE}:base" \
            "${IMAGE}:base-amd64" "${IMAGE}:base-arm64"
          docker manifest push "${IMAGE}:base"

      - name: Copy prebake dockerfile
        if: steps.base-check.outputs.rebuild != 'true'
        run: |
          mkdir -p /tmp/build
          cp internal/container/configs/prebake.dockerfile /tmp/build/

      - name: Build and push multi-arch image
        run: |
          IMAGE=ghcr.io/dakaneye/claude-sandbox
          VERSION=${{ steps.version.outputs.version }}
          MAJOR=${{ steps.version.outputs.major }}

          TAGS=""
          for TAG in "${VERSION}" "${MAJOR}" "latest"; do
            TAGS="${TAGS} -t ${IMAGE}:${TAG}"
          done
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${IMAGE}:base" \
            --label "org.opencontainers.image.source=https://github.com/dakaneye/claude-sandbox" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            ${TAGS} \
            --push \
            -f /tmp/build/prebake.dockerfile \
            /tmp/build

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Get image digest
        id: digest
        run: |
          IMAGE=ghcr.io/dakaneye/claude-sandbox
          VERSION=${{ steps.version.outputs.version }}
          DIGEST=$(crane digest "${IMAGE}:${VERSION}")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Image digest: $DIGEST"

      - name: Scan image for vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          image: ghcr.io/dakaneye/claude-sandbox:${{ steps.version.outputs.version }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true

      - name: Sign image
        run: |
          IMAGE=ghcr.io/dakaneye/claude-sandbox
          DIGEST=${{ steps.digest.outputs.digest }}
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate and attest SBOM
        run: |
          IMAGE=ghcr.io/dakaneye/claude-sandbox
          VERSION=${{ steps.version.outputs.version }}
          DIGEST=${{ steps.digest.outputs.digest }}
          syft "${IMAGE}:${VERSION}" -o spdx-json > /tmp/sbom.spdx.json
          cosign attest --yes --type spdxjson --predicate /tmp/sbom.spdx.json "${IMAGE}@${DIGEST}"

      - name: Attest SLSA provenance
        run: |
          IMAGE=ghcr.io/dakaneye/claude-sandbox
          DIGEST=${{ steps.digest.outputs.digest }}
          cosign attest --yes --type slsaprovenance --predicate <(cat <<PRED
          {
            "buildType": "https://github.com/dakaneye/claude-sandbox/container-build@v1",
            "builder": { "id": "https://github.com/dakaneye/claude-sandbox/actions/runs/${{ github.run_id }}" },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/dakaneye/claude-sandbox@${{ github.ref }}",
                "digest": { "sha1": "${{ github.sha }}" },
                "entryPoint": ".github/workflows/release.yml"
              }
            },
            "metadata": {
              "buildStartedOn": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "completeness": { "parameters": true, "environment": true, "materials": true }
            },
            "materials": [
              { "uri": "git+https://github.com/dakaneye/claude-sandbox@${{ github.ref }}", "digest": { "sha1": "${{ github.sha }}" } }
            ]
          }
          PRED
          ) "${IMAGE}@${DIGEST}"
