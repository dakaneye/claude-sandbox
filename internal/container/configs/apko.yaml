# Claude Sandbox - Fat Base Image
contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    # Base system
    - wolfi-baselayout
    - ca-certificates-bundle
    - bash
    - busybox      # Provides /bin/sh and other POSIX utilities
    - coreutils
    - findutils

    # Node.js runtime (Claude Code)
    - nodejs-22
    - npm

    # Go development
    - go
    - golangci-lint

    # Python development
    - python-3.12
    - py3-pip

    # Cloud/infra tools
    - kubectl
    # terraform removed: bundles vulnerable go-getter (GHSA-wjrx-6529-hcj3)
    # and is not needed for Go development quality gates
    - gh

    # Dev utilities
    - git
    - make
    - curl
    - wget
    - jq
    - yq
    - ripgrep
    - fd
    - fzf
    - tree
    - grep
    - sed
    - gawk

accounts:
  users:
    - username: claude
      uid: 65532
      gid: 65532
      shell: /bin/bash
  groups:
    - groupname: claude
      gid: 65532
  run-as: claude

work-dir: /workspace

entrypoint:
  command: /bin/bash

environment:
  PATH: /home/claude/.npm-global/bin:/home/claude/go/bin:/usr/local/bin:/usr/bin:/bin
  NPM_CONFIG_PREFIX: /home/claude/.npm-global
  GOPATH: /home/claude/go
  NODE_ENV: production
  TERM: xterm-256color

paths:
  - path: /workspace
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/claude
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/claude/.npm-global
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/claude/go
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/claude/.claude
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

archs:
  - amd64
  - arm64

annotations:
  org.opencontainers.image.title: claude-sandbox
  org.opencontainers.image.description: Sandboxed environment for autonomous Claude Code execution
  org.opencontainers.image.source: https://github.com/dakaneye/claude-sandbox
